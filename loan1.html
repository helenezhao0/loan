<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保单借款计算器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Microsoft YaHei}
        body{background:#f5f7fa;padding:20px;max-width:600px;margin:30px auto;}
        .box{background:#fff;padding:25px;border-radius:12px;box-shadow:0 2px 12px #e2e8f0;}
        h2{text-align:center;color:#2d3748;margin-bottom:25px;}
        .item{margin-bottom:18px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
        label{width:120px;color:#4a5568;font-weight:500;}
        input,select{flex:1;min-width:180px;padding:11px 12px;border:1px solid #cbd5e0;border-radius:6px;font-size:15px;outline:none;background:#fff;}
        .tip{padding:11px 10px;background:#edf2fb;border-radius:6px;color:#2b6cb0;min-width:85px;white-space:nowrap;}
        button{width:100%;padding:13px;background:#2b6cb0;color:#fff;border:none;border-radius:6px;font-size:16px;margin:8px 0;cursor:pointer;}
        button:active{background:#235999;}
        .btn-gray{background:#718096;}
        .btn-gray:active{background:#5a687c;}
        .result{margin-top:15px;padding:15px;background:#f0f7ff;border-radius:8px;font-size:16px;}
        .res-item{margin:6px 0;}
        /* 弹窗样式 */
        .mask{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);padding:20px;}
        .history-box{background:#fff;border-radius:10px;padding:20px;max-width:540px;margin:0 auto;max-height:80vh;overflow-y:auto;}
        .history-item{border-bottom:1px solid #eee;padding:10px 0;font-size:14px;}
        .history-title{font-size:18px;font-weight:bold;margin-bottom:15px;text-align:center;}
    </style>
</head>
<body>
<div class="box">
    <h2>保单借款计算器</h2>

    <!-- 1 借款金额 -->
    <div class="item">
        <label>借款金额(元)</label>
        <input type="number" id="money" placeholder="输入借款金额">
    </div>

    <!-- 2 借款天数 -->
    <div class="item">
        <label>借款天数(天)</label>
        <input type="number" id="day" placeholder="输入借款天数">
    </div>

    <!-- 3 险种类型 原生下拉 -->
    <div class="item">
        <label>险种类型</label>
        <select id="typeSel">
            <option value="">--请选择险种--</option>
            <option value="分红型">分红型</option>
            <option value="传统型">传统型</option>
        </select>
        <span class="tip" id="rateTip"></span>
    </div>

    <!-- 4 客户等级 原生下拉 -->
    <div class="item">
        <label>客户等级</label>
        <select id="levelSel">
            <option value="">--请选择客户等级--</option>
            <option value="尊钻">尊钻</option>
            <option value="黑钻">黑钻</option>
            <option value="金钻">金钻</option>
            <option value="星钻">星钻</option>
            <option value="贵宾">贵宾</option>
            <option value="普通客户">普通客户</option>
        </select>
        <span class="tip" id="discountTip"></span>
    </div>

    <button onclick="calc()">计算到期利息</button>
    <button class="btn-gray" onclick="showHistory()">查看历史计算记录</button>

    <div class="result" id="resultBox">
        <div class="res-item">借款利率：<span id="showRate">--</span></div>
        <div class="res-item">适用折扣：<span id="showDiscount">--</span></div>
        <div class="res-item"><strong>到期利息(元)：<span id="showInterest">--</span></strong></div>
    </div>
</div>

<!-- 历史记录弹窗 -->
<div class="mask" id="mask">
    <div class="history-box">
        <div class="history-title">历史计算记录</div>
        <div id="historyList"></div>
        <button onclick="clearHistory()" class="btn-gray">清空全部记录</button>
        <button onclick="closeMask()">关闭</button>
    </div>
</div>

<script>
// 配置参数
const typeConfig = {
    "分红型":{rate:0.05,show:"5%"},
    "传统型":{rate:0.0475,show:"4.75%"}
}
const levelConfig = {
    "尊钻":{discount:0.95,show:"九五折"},
    "黑钻":{discount:0.96,show:"九六折"},
    "金钻":{discount:0.98,show:"九八折"},
    "星钻":{discount:1,show:"不打折"},
    "贵宾":{discount:1,show:"不打折"},
    "普通客户":{discount:1,show:"不打折"}
}

const typeSel = document.getElementById('typeSel');
const levelSel = document.getElementById('levelSel');
const rateTip = document.getElementById('rateTip');
const discountTip = document.getElementById('discountTip');
const mask = document.getElementById('mask');
const historyList = document.getElementById('historyList');

// 读取本地存储历史记录
function getHistory(){
    let arr = localStorage.getItem('loanCalcHistory');
    return arr ? JSON.parse(arr) : [];
}
// 保存记录到本地
function saveHistory(data){
    let list = getHistory();
    list.unshift(data); // 新记录放最上面
    localStorage.setItem('loanCalcHistory',JSON.stringify(list));
}

// 切换险种自动更新右侧提示
typeSel.onchange = function(){
    let val = this.value;
    if(val){
        rateTip.innerText = typeConfig[val].show;
    }else{
        rateTip.innerText = '';
    }
}

// 切换等级自动更新右侧提示
levelSel.onchange = function(){
    let val = this.value;
    if(val){
        discountTip.innerText = levelConfig[val].show;
    }else{
        discountTip.innerText = '';
    }
}

// 计算函数
function calc(){
    let money = Number(document.getElementById('money').value);
    let day = Number(document.getElementById('day').value);
    let selType = typeSel.value;
    let selLevel = levelSel.value;

    if(!money || !day || !selType || !selLevel){
        alert("请完整填写：借款金额、借款天数、选择险种和客户等级！");
        return;
    }
    let rate = typeConfig[selType].rate;
    let discount = levelConfig[selLevel].discount;
    // 计算公式：本金*((1+利率*折扣)^(天数/365)-1)
    let interest = money * (Math.pow(1 + rate * discount, day / 365) - 1);
    interest = Number(interest.toFixed(2));

    // 赋值展示
    document.getElementById('showRate').innerText = (rate*100)+"%";
    document.getElementById('showDiscount').innerText = discount;
    document.getElementById('showInterest').innerText = interest;

    // 保存本次记录
    let record = {
        time:new Date().toLocaleString(),
        money:money,
        day:day,
        type:selType,
        level:selLevel,
        rate:(rate*100)+"%",
        discount:levelConfig[selLevel].show,
        interest:interest
    }
    saveHistory(record);
}

// 打开历史弹窗
function showHistory(){
    let list = getHistory();
    mask.style.display = 'block';
    if(list.length === 0){
        historyList.innerHTML = '<p style="text-align:center;color:#666">暂无计算记录</p>';
        return;
    }
    let html = '';
    list.forEach(item=>{
        html += `
        <div class="history-item">
            <div>时间：${item.time}</div>
            <div>借款金额：${item.money}元｜借款天数：${item.day}天</div>
            <div>险种：${item.type}｜客户等级：${item.level}</div>
            <div>执行利率：${item.rate}｜折扣：${item.discount}</div>
            <div><strong>到期利息：${item.interest}元</strong></div>
        </div>
        `
    })
    historyList.innerHTML = html;
}
// 关闭弹窗
function closeMask(){
    mask.style.display = 'none';
}
// 清空记录
function clearHistory(){
    localStorage.removeItem('loanCalcHistory');
    historyList.innerHTML = '<p style="text-align:center;color:#666">已清空全部记录</p>';
}
</script>
</body>
</html>
